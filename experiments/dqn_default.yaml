# Deep Q-Network on FlappyBird with a 5-feature continuous state.
agent:
  hidden: 128
  gamma: 0.99
  lr: 0.0005
  batch_size: 64
  buffer_capacity: 50000
  warmup_steps: 1000
  target_update_steps: 1000
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_steps: 100000

env:
  reward_alive: 0.0
  reward_pipe: 1.0
  reward_death: -1.0
  reward_gap_shaping: 1.0
